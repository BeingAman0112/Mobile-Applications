<ion-header>
  <ion-toolbar>
    <ion-title>Utility Toolbox</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="tiles-container">
    <!-- Tile 1: QR Scanner -->
    <div class="tile" (click)="openQRScanner()">
      <div class="tile-icon">📷</div>
      <div class="tile-title">QR Scanner</div>
      <div class="tile-description">Scan QR codes and barcodes</div>
      <div class="tile-status active">● Active</div>
    </div>

    <!-- Tile 2: PDF from Images -->
    <div class="tile" (click)="openPDFMaker()">
      <div class="tile-icon">📄</div>
      <div class="tile-title">PDF from Images</div>
      <div class="tile-description">Convert images to PDF document</div>
      <div class="tile-status active">● Active</div>
    </div>

    <!-- Tile 3: PDF ↔ DOC Converter (Coming Soon) -->
    <div class="tile disabled">
      <div class="tile-icon">🔄</div>
      <div class="tile-title">PDF ↔ DOC</div>
      <div class="tile-description">Convert between PDF and Word</div>
      <div class="tile-status coming-soon">● Coming Soon</div>
    </div>

    <!-- Tile 4: Image Resizer (Coming Soon) -->
    <div class="tile disabled">
      <div class="tile-icon">🖼️</div>
      <div class="tile-title">Image Resizer</div>
      <div class="tile-description">Resize, crop, adjust dimensions</div>
      <div class="tile-status coming-soon">● Coming Soon</div>
    </div>
  </div>
</ion-content>
