<ion-header>
  <ion-toolbar>
    <ion-title>My QR Tool</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-text>
    <h2>QR Code Scanner</h2>
  </ion-text>

  <ion-button expand="block" (click)="startScan()">
    Start Scan
  </ion-button>

  <ion-text>
    <p>Result: <strong>{{ scannedData }}</strong></p>
  </ion-text>
</ion-content>
